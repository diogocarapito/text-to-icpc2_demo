services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: icpc2
      POSTGRES_USER: icpc2user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U icpc2user -d icpc2"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - "80:8501"
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: icpc2
      POSTGRES_USER: icpc2user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
