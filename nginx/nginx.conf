server {
    listen 80;
    server_name text-to-icpc2.com www.text-to-icpc2.com;

    # Required for Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
