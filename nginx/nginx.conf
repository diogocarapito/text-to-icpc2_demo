server {
    listen 80;
    server_name text-to-icpc2.com www.text-to-icpc2.com;

    # Required for Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://text-to-icpc2.com$request_uri;
    }
}

# Redirect www to apex
server {
    listen 443 ssl;
    server_name www.text-to-icpc2.com;

    ssl_certificate /etc/letsencrypt/live/text-to-icpc2.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/text-to-icpc2.com/privkey.pem;

    return 301 https://text-to-icpc2.com$request_uri;
}

server {
    listen 443 ssl;
    server_name text-to-icpc2.com;

    ssl_certificate /etc/letsencrypt/live/text-to-icpc2.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/text-to-icpc2.com/privkey.pem;

    location / {
        proxy_pass http://app:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

